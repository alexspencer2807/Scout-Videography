<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Scout Videography Jamaica | Soccer Highlights, VR Training & AI Analysis{% endblock %}</title>
  <meta name="description" content="{% block description %}Professional soccer highlight videos, VR skills training with Rezzil, and AI-powered performance analysis. Serving athletes in Kingston & St. Andrew, Jamaica.{% endblock %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% include 'partials/header.html' %}

  {% block content %}{% endblock %}

  {% include 'partials/footer.html' %}
  {% include 'partials/whatsapp.html' %}

  <script src="{{ url_for('static', filename='js/notification.js') }}"></script>
  <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
  <script src="{{ url_for('static', filename='js/hamburger.js') }}"></script>
  {% block scripts %}{% endblock %}

</html>
